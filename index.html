<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WES JAPAN 2026</title>
    <link rel="stylesheet" href="Styles.css">
    <!-- HTML2Canvas Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container" id="printArea">
        <div class="header">
            <img src="LOGO_CATALOGO.png" class="logo" alt="Logo">
        </div>

        <div class="producto">
            <div class="info">
                <div class="info-row">
                    <span class="label"><strong>FECHA:</strong></span>
                    <span id="fechaDeHoy" class="value"></span>
                </div>
                <div class="info-row">
                    <span class="label"><strong>DESCRIPCIÓN:</strong></span>
                    <span id="descripcionP" class="value"></span>
                </div>
                <!-- Elementos ocultos por CSS pero necesarios para el Script -->
                <div class="info-row">
                    <span id="codigoP" class="value"></span>
                </div>
                <div class="info-row">
                    <span id="precioV" class="value"></span>
                </div>
                <div class="info-row">
                    <span id="existencias" class="value"></span>
                </div>
            </div>

            <div class="galeria">
                <div class="imagenP">
                    <!-- El src se llena dinámicamente -->
                    <img id="imgProducto" src="" alt="Producto">
                </div>
            </div>

            <div class="codigo_qr">
                <img src="wesito.png" alt="Codigo QR">
            </div>

            <div class="footer">
                <div class="divider"></div>
                <div class="bible-verse">
                    <strong>TODO LO PUEDO EN CRISTO QUE ME FORTALECE!</strong>
                </div>
            </div>
        </div>

        <div class="print-button-container">
            <button class="print-button" id="btnDescargar">Descargar Imagen</button>
        </div>
    </div>

    <script src="Script.js"></script>
</body>
</html>
